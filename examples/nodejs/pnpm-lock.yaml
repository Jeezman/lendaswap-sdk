lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    dependencies:
      '@lendasat/lendaswap-sdk-native':
        specifier: file:../../node-sdk
        version: file:../../node-sdk

packages:

  '@lendasat/lendaswap-sdk-native@file:../../node-sdk':
    resolution: {directory: ../../node-sdk, type: directory}
    engines: {node: '>= 18'}

snapshots:

  '@lendasat/lendaswap-sdk-native@file:../../node-sdk': {}
